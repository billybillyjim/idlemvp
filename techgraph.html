<!DOCTYPE html>
<html lang="en">

<head>
	<meta charset="UTF-8">
	<title>Technology Dependency Graph</title>
	<script src="https://d3js.org/d3.v7.min.js"></script>
	<style>
		body {
			font-family: sans-serif;
			margin: 0;
			overflow: hidden;
			background-color: black;
		}

		.node circle {
			fill: #69b3a2;
			stroke: #333;
			stroke-width: 1.5px;
		}

		text {
			color: white;
			font-size: 14px;
			/* size */
			font-family: "Arial", sans-serif;
			/* type */
			pointer-events: none;
			stroke-width: 2px;
			stroke: black;
			paint-order: stroke fill;
		}

		.link {
			stroke: #999;
			stroke-opacity: 0.6;
			stroke-width: 1.5px;
			marker-end: url(#arrow);
		}

		.tooltip {
			position: absolute;
			max-width: 280px;
			background: #1e1e1e;
			color: #eaeaea;
			border: 1px solid #444;
			border-radius: 10px;
			padding: 10px 12px;
			box-shadow: 0 8px 20px rgba(0, 0, 0, .5);
			pointer-events: auto;
			font-size: 12px;
			z-index: 10;
		}

		.tooltip.hidden {
			display: none;
		}

		.tooltip .title {
			font-weight: 700;
			margin-bottom: 6px;
		}

		.tooltip .row {
			margin: 2px 0;
			opacity: .9;
		}

		.tooltip .k {
			color: #aaa;
		}

		.tooltip .close {
			float: right;
			cursor: pointer;
			opacity: .7;
			font-weight: 700;
			margin-left: 8px;
		}

		.search-wrap {
			margin-top: 8px;
			max-width: 360px;
		}

		.search-wrap label {
			display: block;
			margin-bottom: 4px;
		}

		#techSearchInput {
			width: 100%;
			box-sizing: border-box;
			padding: 6px 8px;
			border: 1px solid #666;
			border-radius: 4px;
			background: #111;
			color: #fff;
		}

		#techSearchResults {
			margin-top: 6px;
			max-height: 180px;
			overflow-y: auto;
			background: #111;
			border: 1px solid #444;
			border-radius: 6px;
			display: none;
		}

		#techSearchResults.has-items {
			display: block;
		}

		.search-result {
			display: block;
			width: 100%;
			padding: 6px 8px;
			text-align: left;
			background: transparent;
			color: #eee;
			border: 0;
			border-bottom: 1px solid #333;
			cursor: pointer;
		}

		.search-result:last-child {
			border-bottom: 0;
		}

		.search-result:hover,
		.search-result:focus {
			background: #2a2a2a;
			outline: none;
		}

		.search-result.empty {
			cursor: default;
			opacity: 0.8;
		}
	</style>
</head>

<body>
	<div style="color:white;">
		<div>Legend</div>
		<div>Green: Has requirements and is a requirement</div>
		<div>Orange: Has no requirements (Available at start of game.)</div>
		<div>Red: Is a requirement for nothing.</div>
		<div>Purple: In a mutual (two-way) dependency</div>
		<div id="controls" style="color:white; margin:8px 12px;">
			<div style="margin-top:6px;">
				<label for="chargeSlider">Node Pressure</label>
				<input id="chargeSlider" type="range" min="100" max="1500" step="25" value="600">
				<span id="chargeVal">600</span>
			</div>
			<div style="margin-top:6px;">
				<label for="linkSlider">Link distance</label>
				<input id="linkSlider" type="range" min="40" max="200" step="5" value="100">
				<span id="linkVal">100</span>
			</div>
			<div style="margin-top:6px;">
				<button id="clearHighlightBtn" style="display:none; color:white; background:#333; border:1px solid #666; border-radius:4px; padding:3px 8px; cursor:pointer;">✕ Clear Highlight</button>
			</div>
			<div class="search-wrap">
				<label for="techSearchInput">Search Technologies</label>
				<input id="techSearchInput" type="text" placeholder="Type to search...">
				<div id="techSearchResults" aria-live="polite"></div>
			</div>
		</div>
	</div>
	<div id="tech-tooltip" class="tooltip hidden"></div>
	<script type="module">
		import technologies from './data/technologydata.js'
		const techByName = new Map(technologies.map(t => [t.Name, t]));
		function buildDependencyGraph() {
			const graph = {};
			for (const tech of technologies) {
				graph[tech.Name] = { dependsOn: [], requiredBy: [] };
			}

			for (const tech of technologies) {
				const reqs = tech.Requirements?.Technologies || [];
				for (const dep of reqs) {
					if (!graph[dep]) graph[dep] = { dependsOn: [], requiredBy: [] };
					graph[tech.Name].dependsOn.push(dep);
					graph[dep].requiredBy.push(tech.Name);
				}
			}
			const mutualNodes = new Set();
			for (const [a, relsA] of Object.entries(graph)) {
				for (const b of relsA.dependsOn) {
					const relsB = graph[b];
					if (relsB && relsB.dependsOn.includes(a)) {
						mutualNodes.add(a);
						mutualNodes.add(b);
						console.log(a, b);
					}
				}
			}
			// Build node-link structure for D3
			const nodes = Object.entries(graph).map(([name, rels]) => ({
				id: name,
				dependsOn: rels.dependsOn,
				requiredBy: rels.requiredBy,
				hasMutual: mutualNodes.has(name),
				tech: techByName.get(name) || { Name: name }
			}));

			const links = [];

			for (const [target, data] of Object.entries(graph)) {
				for (const source of data.dependsOn) {
					links.push({ source, target });
				}
			}

			return { nodes, links };
		}

		const { nodes, links } = buildDependencyGraph();
		const nodeById = new Map(nodes.map(n => [n.id, n]));

		let width = window.innerWidth;
		let height = window.innerHeight;


		const nodeRadius = d => {
			const c = d.tech?.Complexity;
			return c ? sizeScale(c) : 8;
		};

		const svg = d3.select("body").append("svg")
			.attr("width", width)
			.attr("height", height);
		const zoomTarget = svg.append("g")
			.classed("zoom-target", true);

		// Setup zoom behavior
		const zoom = d3.zoom()
			.scaleExtent([0.5, 5])
			.translateExtent([[-width, -height], [2 * width, 2 * height]])
			.on("zoom", function (event) {
				zoomTarget.attr("transform", event.transform);
			});

		// Attach zoom to the SVG
		svg.call(zoom);
		// Define arrowhead marker + glow filter
		const defs = zoomTarget.append("defs");
		defs.append("marker")
			.attr("id", "arrow")
			.attr("viewBox", "0 -5 10 10")
			.attr("refX", 10)
			.attr("refY", 0)
			.attr("markerWidth", 6)
			.attr("markerHeight", 6)
			.attr("orient", "auto")
			.append("path")
			.attr("d", "M0,-5L10,0L0,5")
			.attr("fill", "#999");

		const glowFilter = defs.append("filter")
			.attr("id", "link-glow")
			.attr("x", "-50%").attr("y", "-50%")
			.attr("width", "200%").attr("height", "200%");
		glowFilter.append("feGaussianBlur")
			.attr("in", "SourceGraphic")
			.attr("stdDeviation", "3")
			.attr("result", "blur");
		const feMerge = glowFilter.append("feMerge");
		feMerge.append("feMergeNode").attr("in", "blur");
		feMerge.append("feMergeNode").attr("in", "blur");
		feMerge.append("feMergeNode").attr("in", "SourceGraphic");

		const sizeScale = d3.scaleSqrt()
			.domain([50, 5000000])
			.range([6, 40]);

		const simulation = d3.forceSimulation(nodes)
			.force("link", d3.forceLink(links).id(d => d.id).distance(100))
			.force("charge", d3.forceManyBody().strength(-600))
			.force("center", d3.forceCenter(width / 2, height / 2));

		const link = zoomTarget.append("g")
			.attr("stroke", "#999")
			.attr("stroke-opacity", 0.6)
			.selectAll("line")
			.data(links)
			.enter().append("line")
			.attr("class", "link")
			.attr("marker-end", "url(#arrow)");

		const node = zoomTarget.append("g")
			.attr("stroke", "#fff")
			.attr("stroke-width", 1.5)
			.selectAll("g")
			.data(nodes)
			.enter().append("g")
			.call(d3.drag()
				.on("start", dragstarted)
				.on("drag", dragged)
				.on("end", dragended))
			.on("click", function (event, d) {
				event.stopPropagation();
				showTooltip(event, d);
			});

		node.append("circle")
			.attr("r", d => {
				;
				return nodeRadius(d);
			})
			.attr("fill", function (d) {

				if (d.hasMutual) return "purple";

				const hasAttached = d.requiredBy && d.requiredBy.length > 0;
				const hasDeps = d.dependsOn && d.dependsOn.length > 0;

				if (!hasAttached) return "red";      // not required by anything
				if (!hasDeps) return "orange";       // depends on nothing
				return "#69b3a2";
			});

		node.append("text")
			.text(d => d.id)
			.attr("x", 14)
			.attr("y", 4)
			.style("fill", "white");

		simulation.on("tick", () => {
			link
				.attr("x1", d => d.source.x)
				.attr("y1", d => d.source.y)
				.attr("x2", d => {
					const dx = d.target.x - d.source.x;
					const dy = d.target.y - d.source.y;
					const r = nodeRadius(d.target);
					const l = Math.sqrt(dx * dx + dy * dy);
					return d.target.x - (dx * r) / l;
				})
				.attr("y2", d => {
					const dx = d.target.x - d.source.x;
					const dy = d.target.y - d.source.y;
					const r = nodeRadius(d.target);
					const l = Math.sqrt(dx * dx + dy * dy);
					return d.target.y - (dy * r) / l;
				});

			node
				.attr("transform", d => `translate(${d.x},${d.y})`);
		});

		function dragstarted(event, d) {
			if (!event.active) simulation.alphaTarget(0.03).restart();
			d.fx = d.x;
			d.fy = d.y;
		}

		function dragged(event, d) {
			d.fx = event.x;
			d.fy = event.y;
		}

		function dragended(event, d) {
			if (!event.active) simulation.alphaTarget(0);
			d.fx = null;
			d.fy = null;
		}

		const tooltipEl = d3.select('#tech-tooltip');

		function fmtCost(cost) {
			if (!cost || typeof cost !== 'object') return '—';
			const entries = Object.entries(cost);
			if (!entries.length) return '—';
			return entries.map(([k, v]) => `${k}: ${v}`).join(', ');
		}

		function safeList(arr) {
			return Array.isArray(arr) && arr.length ? arr.join(', ') : '—';
		}

		function handleResize() {
			// 1) Measure
			width = window.innerWidth;
			height = window.innerHeight;

			// 2) Resize the drawing surface
			svg.attr("width", width).attr("height", height);

			// 3) Update pan bounds to the new canvas
			zoom.translateExtent([[-width, -height], [2 * width, 2 * height]]);

			// 4) Keep the simulation centered to the new viewport
			simulation.force("center", d3.forceCenter(width / 2, height / 2));

			// 5) Nudge the sim so the new center takes effect
			simulation.alpha(0.1).restart();

			// 6) If a tooltip is open, keep it on-screen
			if (!tooltipEl.classed("hidden")) {
				const left = parseFloat(tooltipEl.style("left")) || 12;
				const top = parseFloat(tooltipEl.style("top")) || 12;
				const [tx, ty] = clampTooltip(left, top);
				tooltipEl.style("left", `${tx}px`).style("top", `${ty}px`);
			}
		}

		function clampTooltip(x, y) {
			const pad = 12;
			const w = 280;  // match CSS max-width
			const h = 180;  // rough height; will reflow but prevents overflow
			const vw = window.innerWidth, vh = window.innerHeight;
			return [
				Math.min(Math.max(pad, x), vw - w - pad),
				Math.min(Math.max(pad, y), vh - h - pad)
			];
		}

		function showTooltip(event, d) {
			const t = d.tech || {};
			const reqs = t.Requirements?.Technologies || [];
			const rby = d.requiredBy || [];
			const content = `
				<span class="close" title="Close">×</span>
				<div class="title">${t.Name ?? d.id}</div>
				<div class="row"><span class="k">Description:</span> ${t.Description || '—'}</div>
				<div class="row"><span class="k">Complexity:</span> ${t.Complexity ?? '—'}</div>
				<div class="row"><span class="k">Progress:</span> ${t.Progress ?? '—'}</div>
				<div class="row"><span class="k">Requirements:</span> ${safeList(reqs)}</div>
				<div class="row"><span class="k">Required By:</span> ${safeList(rby)}</div>
				<div class="row"><span class="k">Cost:</span> ${fmtCost(t.Cost)}</div>
				<div class="row" style="margin-top:8px;"><button class="hl-deps-btn" style="cursor:pointer;background:#2a4a2a;color:#f0c040;border:1px solid #f0c040;border-radius:4px;padding:3px 8px;">Highlight Dependencies</button></div>
			`;

			tooltipEl.html(content).classed('hidden', false);

			// position near pointer, independent of zoom/pan
			const [px, py] = d3.pointer(event, document.body);
			const [tx, ty] = clampTooltip(px + 12, py + 12);
			tooltipEl.style('left', `${tx}px`).style('top', `${ty}px`);

			// close button
			tooltipEl.select('.close').on('click', () => tooltipEl.classed('hidden', true));
			// highlight dependencies button
			tooltipEl.select('.hl-deps-btn').on('click', () => applyHighlight(getAncestors(d.id)));
		}

		function hideTooltip() {
			tooltipEl.classed('hidden', true);
		}

		// ── Dependency highlight ──────────────────────────────────────────────────
		let highlightedSet = null;
		let clearBtn = null;

		function getNodeFill(d) {
			if (d.hasMutual) return "purple";
			const hasAttached = d.requiredBy && d.requiredBy.length > 0;
			const hasDeps = d.dependsOn && d.dependsOn.length > 0;
			if (!hasAttached) return "red";
			if (!hasDeps) return "orange";
			return "#69b3a2";
		}

		function getAncestors(startId) {
			const visited = new Set();
			const queue = [startId];
			visited.add(startId);
			while (queue.length > 0) {
				const current = queue.shift();
				const n = nodeById.get(current);
				if (!n) continue;
				for (const dep of n.dependsOn) {
					if (!visited.has(dep)) {
						visited.add(dep);
						queue.push(dep);
					}
				}
			}
			return visited;
		}

		function applyHighlight(ancestorSet) {
			highlightedSet = ancestorSet;
			node.select("circle")
				.attr("fill", d => ancestorSet.has(d.id) ? "#f0c040" : getNodeFill(d))
				.attr("opacity", d => ancestorSet.has(d.id) ? 1 : 0.15);
			node.select("text")
				.attr("opacity", d => ancestorSet.has(d.id) ? 1 : 0.15);
			link
				.style("stroke", d => {
					const s = typeof d.source === 'object' ? d.source.id : d.source;
					const t = typeof d.target === 'object' ? d.target.id : d.target;
					return (ancestorSet.has(s) && ancestorSet.has(t)) ? "#f0c040" : "#999";
				})
				.style("stroke-opacity", d => {
					const s = typeof d.source === 'object' ? d.source.id : d.source;
					const t = typeof d.target === 'object' ? d.target.id : d.target;
					return (ancestorSet.has(s) && ancestorSet.has(t)) ? 1 : 0.15;
				})
				.style("stroke-width", d => {
					const s = typeof d.source === 'object' ? d.source.id : d.source;
					const t = typeof d.target === 'object' ? d.target.id : d.target;
					return (ancestorSet.has(s) && ancestorSet.has(t)) ? "2.5px" : "1.5px";
				})
				.attr("filter", d => {
					const s = typeof d.source === 'object' ? d.source.id : d.source;
					const t = typeof d.target === 'object' ? d.target.id : d.target;
					return (ancestorSet.has(s) && ancestorSet.has(t)) ? "url(#link-glow)" : null;
				});
			if (clearBtn) clearBtn.style.display = "inline-block";
		}

		function clearHighlight() {
			highlightedSet = null;
			node.select("circle")
				.attr("fill", d => getNodeFill(d))
				.attr("opacity", 1);
			node.select("text")
				.attr("opacity", 1);
			link
				.style("stroke", null)
				.style("stroke-opacity", null)
				.style("stroke-width", null)
				.attr("filter", null);
			if (clearBtn) clearBtn.style.display = "none";
		}

		const chargeSlider = document.getElementById('chargeSlider');
		const linkSlider = document.getElementById('linkSlider');
		const chargeVal = document.getElementById('chargeVal');
		const linkVal = document.getElementById('linkVal');
		const techSearchInput = document.getElementById('techSearchInput');
		const techSearchResults = document.getElementById('techSearchResults');

		function getNodeLabel(n) {
			return n.tech?.Name || n.id;
		}

		const searchableNodes = nodes
			.map(n => ({
				id: n.id,
				label: getNodeLabel(n),
				searchText: getNodeLabel(n).toLowerCase()
			}))
			.sort((a, b) => a.label.localeCompare(b.label));

		function clearSearchResults() {
			techSearchResults.innerHTML = '';
			techSearchResults.classList.remove('has-items');
		}

		function clearSearchInputAndResults() {
			techSearchInput.value = '';
			clearSearchResults();
		}

		function renderSearchResults(matches, hasQuery) {
			clearSearchResults();
			if (!hasQuery) return;

			if (!matches.length) {
				const empty = document.createElement('div');
				empty.className = 'search-result empty';
				empty.textContent = 'No matches';
				techSearchResults.appendChild(empty);
				techSearchResults.classList.add('has-items');
				return;
			}

			for (const item of matches) {
				const btn = document.createElement('button');
				btn.type = 'button';
				btn.className = 'search-result';
				btn.textContent = item.label;
				btn.addEventListener('click', (event) => {
					event.stopPropagation();
					clearSearchInputAndResults();
					tooltipEl.classed('hidden', true);
					applyHighlight(getAncestors(item.id));
				});
				techSearchResults.appendChild(btn);
			}

			techSearchResults.classList.add('has-items');
		}

		techSearchInput.addEventListener('input', (event) => {
			const query = event.target.value.trim().toLowerCase();
			if (!query) {
				clearSearchResults();
				return;
			}

			const matches = searchableNodes
				.filter(item => item.searchText.includes(query))
				.slice(0, 100);

			renderSearchResults(matches, true);
		});

		techSearchInput.addEventListener('keydown', (event) => {
			if (event.key === 'Enter') {
				const firstResultBtn = techSearchResults.querySelector('button.search-result');
				if (firstResultBtn) {
					event.preventDefault();
					firstResultBtn.click();
				}
				return;
			}

			if (event.key === 'Escape') {
				clearSearchInputAndResults();
			}
		});

		function applyCharge(valAbs) {
			simulation.force('charge').strength(-Number(valAbs));
		}

		function applyLinkDistance(val) {
			simulation.force('link').distance(Number(val));
		}


		let coolTimer = null;
		function reheat() {
			if (!simulation) return;
			simulation.alphaTarget(0.04).restart();
			clearTimeout(coolTimer);
			coolTimer = setTimeout(() => simulation.alphaTarget(0), 250);
		}

		applyCharge(chargeSlider.value);
		applyLinkDistance(linkSlider.value);

		chargeSlider.addEventListener('input', (e) => {
			const v = Number(e.target.value);
			chargeVal.textContent = v;
			applyCharge(v);
			reheat();
		});

		linkSlider.addEventListener('input', (e) => {
			const v = Number(e.target.value);
			linkVal.textContent = v;
			applyLinkDistance(v);
			reheat();
		});

		let resizeRaf = null;
		window.addEventListener("resize", () => {
			if (resizeRaf) cancelAnimationFrame(resizeRaf);
			resizeRaf = requestAnimationFrame(handleResize);
		});

		// Background click: clear highlight and hide tooltip
		svg.on("click", () => {
			clearHighlight();
			tooltipEl.classed('hidden', true);
		});

		clearBtn = document.getElementById('clearHighlightBtn');
		clearBtn.addEventListener('click', () => clearHighlight());
	</script>
</body>

</html>
